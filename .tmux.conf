# ─────────────────────────────────────────────────────────────────────────────
# ~/.tmux.conf  —  unified config (macOS + Linux), tuned for nvim tokyonight
# ─────────────────────────────────────────────────────────────────────────────

# ── PREFIX ───────────────────────────────────────────────────────────────────
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# ── GENERAL ──────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off
set -g history-limit 30000
set -g escape-time 10          # faster key sequences (important for nvim)
set -g focus-events on         # required by nvim (:checkhealth)
setw -g mouse on
setw -g xterm-keys on
set -g set-clipboard on

# ── TERMINAL / 24-BIT COLOUR ─────────────────────────────────────────────────
# Required by nvim's `termguicolors = true` (tokyonight).
# "screen-256color" base keeps broad compatibility; RGB passthrough on top.
set -g default-terminal "screen-256color"
set -sa terminal-features "screen-256color:RGB"
# For terminals that advertise tmux or xterm-256color:
set -sa terminal-features ",xterm-256color:RGB"
set -sa terminal-features ",tmux-256color:RGB"

# ── VIM-AWARE PANE NAVIGATION ────────────────────────────────────────────────
# Works with alexghergh/nvim-tmux-navigation (same plugin used in init.lua).
# Detects nvim (including lazily loaded nvim processes) reliably.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys 'C-\\'" "select-pane -l"

# Pass C-h/j/k/l through in copy mode too (for nvim-tmux-navigation)
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Bring back clear-screen (displaced by C-l)
bind C-l send-keys 'C-l'

# ── WINDOW / PANE MANAGEMENT ─────────────────────────────────────────────────
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

bind C-p previous-window
bind C-n next-window

# Resize with prefix + Shift-HJKL
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Zoom toggle
bind -n C-z resize-pane -Z
bind    C-z resize-pane -Z

# ── COPY MODE (vi) ───────────────────────────────────────────────────────────
setw -g mode-keys vi
unbind p
bind p paste-buffer

bind-key -T copy-mode-vi v   send -X begin-selection
bind-key -T copy-mode-vi V   send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# ── CLIPBOARD: macOS (pbcopy) vs Linux (xclip) ───────────────────────────────
# Detect OS at runtime via shell command in tmux.
# Each clipboard binding is conditioned on uname output.

# y — copy selection to system clipboard
bind-key -T copy-mode-vi y \
    send -X copy-pipe-and-cancel \
    "sh -c 'uname | grep -q Darwin && pbcopy || xclip -in -selection clipboard'"

# C-c — copy without leaving copy mode
bind -T copy-mode    C-c \
    send -X copy-pipe-no-clear \
    "sh -c 'uname | grep -q Darwin && pbcopy || xclip -selection clipboard'"
bind -T copy-mode-vi C-c \
    send -X copy-pipe-no-clear \
    "sh -c 'uname | grep -q Darwin && pbcopy || xclip -selection clipboard'"

# Double-click — select word + copy to primary (Linux) / clipboard (macOS)
bind -T copy-mode    DoubleClick1Pane \
    select-pane \; send -X select-word \; \
    send -X copy-pipe-no-clear \
    "sh -c 'uname | grep -q Darwin && pbcopy || xsel -i'"
bind -T copy-mode-vi DoubleClick1Pane \
    select-pane \; send -X select-word \; \
    send -X copy-pipe-no-clear \
    "sh -c 'uname | grep -q Darwin && pbcopy || xsel -i'"
bind -n DoubleClick1Pane \
    select-pane \; copy-mode -M \; send -X select-word \; \
    send -X copy-pipe-no-clear \
    "sh -c 'uname | grep -q Darwin && pbcopy || xsel -i'"

# Triple-click — select line
bind -T copy-mode    TripleClick1Pane \
    select-pane \; send -X select-line \; \
    send -X copy-pipe-no-clear \
    "sh -c 'uname | grep -q Darwin && pbcopy || xsel -i'"
bind -T copy-mode-vi TripleClick1Pane \
    select-pane \; send -X select-line \; \
    send -X copy-pipe-no-clear \
    "sh -c 'uname | grep -q Darwin && pbcopy || xsel -i'"
bind -n TripleClick1Pane \
    select-pane \; copy-mode -M \; send -X select-line \; \
    send -X copy-pipe-no-clear \
    "sh -c 'uname | grep -q Darwin && pbcopy || xsel -i'"

# Middle-click paste (Linux primary selection; no-op on macOS)
bind -n MouseDown2Pane \
    run "tmux set-buffer -b primary_sel \"$(xsel -o 2>/dev/null || true)\"; \
         tmux paste-buffer -b primary_sel; \
         tmux delete-buffer -b primary_sel"

# ── PROMPT NAVIGATION ────────────────────────────────────────────────────────
# M-b — jump to previous shell prompt
bind -n M-b {
    copy-mode
    send -X clear-selection
    send -X start-of-line
    send -X search-backward '[\$\#] [^ ]'
    send -X stop-selection
    send -X search-forward "[^ ]"
    send -X stop-selection
}

# M-n — jump to next shell prompt
bind -n M-n {
    copy-mode
    send -X clear-selection
    send -X end-of-line
    send -X search-forward '[\$\#] [^ ]'
    send -X stop-selection
    send -X search-forward "[^ ]"
    send -X stop-selection
}

# M-B — select previous command's output
bind -n M-B {
    set wrap-search off
    copy-mode
    send -X clear-selection
    send -X start-of-line
    if -F "#{m/r:^[^$]+$,#{copy_cursor_line}}" {
        send -X search-backward "\$ "
        send -X stop-selection
    }
    send -X search-backward "^[^$]+$"
    send -X stop-selection
    send -X start-of-line
    if -F "#{m:*$*,#{copy_cursor_line}}" {
    } {
        send -X end-of-line
        send -X cursor-left
        send -X begin-selection
        send -X search-backward-text "$"
        send -X end-of-line
        send -X cursor-right
        send -X stop-selection
    }
    set wrap-search on
}

# ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# ── DESIGN: tokyonight-moon palette ──────────────────────────────────────────
# Colours matched to tokyonight-moon used in init.lua.
#
#   bg_dark    #1e2030   234
#   bg         #222436   235
#   bg_highlight #2f334d  236
#   blue       #82aaff   111
#   blue5      #4fd6be   79
#   cyan       #86e1fc   117
#   green      #c3e88d   150
#   magenta    #c099ff   183
#   purple     #fca7ea   219
#   teal       #4fd6be   79
#   comment    #636da6   61
#   fg         #c8d3f5   189
#   fg_dark    #828bb8   103

# Pane borders
set -g pane-border-style        "fg=#2f334d"
set -g pane-active-border-style "fg=#82aaff"
set -g pane-border-status       top
set -g pane-border-format       " #[fg=#636da6]#{pane_index} #[fg=#c8d3f5]#{pane_current_command} "

# Status bar
set -g status-position   bottom
set -g status-justify    left
set -g status-style      "bg=#1e2030,fg=#c8d3f5"
set -g status-left       ""
set -g status-right      ""
set -g status-left-length  50
set -g status-right-length 50

# Window status
setw -g window-status-style          "fg=#636da6,bg=#1e2030,none"
setw -g window-status-format         " #[fg=#636da6]#I#[fg=#2f334d]:#[fg=#828bb8]#W "
setw -g window-status-current-style  "fg=#c8d3f5,bg=#2f334d,bold"
setw -g window-status-current-format " #[fg=#82aaff]#I#[fg=#4fd6be]:#[fg=#c8d3f5,bold]#W "
setw -g window-status-bell-style     "fg=#ffffff,bg=#ff757f,bold"

# Messages
set -g message-style         "fg=#c8d3f5,bg=#2f334d,bold"
set -g message-command-style "fg=#82aaff,bg=#1e2030"

# Copy mode
setw -g mode-style "fg=#1e2030,bg=#82aaff"

# Clock
setw -g clock-mode-colour "#82aaff"
